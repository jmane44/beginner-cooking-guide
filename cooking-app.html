<!DOCTYPE html>
<html>
<head>
    <title>Beginner Cooking Guide</title>
</head>

<body>

<h1>Beginner Cooking Guide</h1>

<p>Choose a food to learn how to cook it.</p>

<button onclick="showRecipe('eggs')">Scrambled Eggs</button>
<button onclick="showRecipe('rice')">White Rice</button>
<button onclick="showRecipe('pasta')">Pasta</button>
<button onclick="showRecipe('chicken')">Chicken Breast</button>

<hr>

<div id="recipeArea">
    <h2>Select a recipe above.</h2>
</div>

<br>

<a href="scratch.html">Back to Scratch Page</a>
<br>
<a href="index.html">Back to Home</a>

<script>
const recipes = {
    eggs: {
        title: "Scrambled Eggs",
        time: "5-7 minutes",
        difficulty: "Easy",
        ingredients: [
            "2 eggs",
            "1 tablespoon milk",
            "Salt and pepper",
            "Butter or oil"
        ],
        steps: [
            "Crack eggs into a bowl.",
            "Add milk, salt, and pepper.",
            "Whisk until mixed.",
            "Heat a pan with butter.",
            "Pour eggs into the pan and stir gently until cooked."
        ],
        video: "https://www.youtube.com/embed/p0_WWUAPOns"
    },
    rice: {
        title: "White Rice",
        time: "20 minutes",
        difficulty: "Easy",
        ingredients: [
            "1 cup white rice",
            "2 cups water",
            "Pinch of salt"
        ],
        steps: [
            "Rinse the rice.",
            "Add rice, water, and salt to a pot.",
            "Bring to a boil.",
            "Lower heat, cover, and cook for 18 minutes.",
            "Let it rest for 5 minutes before serving."
        ],
        video: "https://www.youtube.com/embed/hnkVNVH3XzE?start=7"
    },
    pasta: {
        title: "Pasta",
        time: "10-12 minutes",
        difficulty: "Easy",
        ingredients: [
            "Pasta",
            "Water",
            "Salt",
            "Sauce of choice"
        ],
        steps: [
            "Boil a large pot of water.",
            "Add salt.",
            "Add pasta and stir.",
            "Cook until tender.",
            "Drain and add sauce."
        ],
        video: "https://www.youtube.com/embed/HlR6PLZcZg4"
    },
    chicken: {
        title: "Chicken Breast",
        time: "20-25 minutes",
        difficulty: "Medium",
        ingredients: [
            "1 chicken breast",
            "Salt and pepper",
            "Oil",
            "Garlic powder or seasoning"
        ],
        steps: [
            "Season both sides of the chicken.",
            "Heat oil in a pan.",
            "Cook chicken 6-8 minutes per side.",
            "Make sure the inside reaches 165°F.",
            "Let it rest before cutting."
        ],
        video: "https://www.youtube.com/embed/NTBRThwL-2c"
    }
};

function showRecipe(food) {
    const recipe = recipes[food];
    const recipeArea = document.getElementById("recipeArea");
    if (!recipe) return;

    recipeArea.innerHTML = `
        <h2>${recipe.title}</h2>
        <p><strong>Time:</strong> ${recipe.time}</p>
        <p><strong>Difficulty:</strong> ${recipe.difficulty}</p>
        <h3>Ingredients</h3>
        <ul>${recipe.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
        <h3>Instructions</h3>
        <ol>${recipe.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        <h3>Video</h3>
        <div id="videoWrap"></div>
    `;

    const iframe = document.createElement("iframe");
    iframe.width = "560";
    iframe.height = "315";
    iframe.src = recipe.video;
    iframe.title = recipe.title + " video";
    iframe.allowFullscreen = true;
    iframe.style.border = "0";

    document.getElementById("videoWrap").appendChild(iframe);
}
</script>

</body>
</html>
